# Builds on GitHub runners (more headroom than forcing a tiny Node heap on Vercel),
# then uploads .vercel/output only (see https://vercel.com/docs/cli/deploy#prebuilt).
#
# Required repo secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# (Vercel dashboard → Project → Settings → General.)
#
# Optional: In Vercel → Settings → Git → Ignored Build Step, use: exit 0
# so pushes do not also run a failing cloud build. Deploys then rely on this workflow.

name: Vercel prebuilt production

on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  NODE_OPTIONS: --max-old-space-size=5120

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Pull Vercel env and project settings
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vite build + pack .vercel/output (no vercel build)
        run: npm run build && node scripts/pack-vercel-static-output.mjs

      - name: Deploy prebuilt
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
