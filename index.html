<!doctype html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedVault | Privacy-First Clinical Trials</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            background-color: #030712;
        }
    </style>
    <script>
        // --- ADVANCED FHEVM PRODUCTION POLYFILLS ---
        window.LOG_DEBUG = (msg, data) => {
            console.log(`[MEDVAULT-DEBUG] ${msg}`, data || '');
        };

        // 1. Core Globals
        window.global = window;
        window.process = {
            env: { NODE_ENV: 'production' },
            nextTick: (cb) => setTimeout(cb, 0),
            browser: true,
            cwd: () => '/'
        };

        // 2. Class-based placeholders to prevent "prototype of undefined" crashes
        // These are overwritten by polyfills.ts once the bundle loads.
        if (!window.EventEmitter) {
            function EventEmitter() {}
            EventEmitter.prototype = {};
            window.EventEmitter = EventEmitter;
        }
        if (!window.Stream) {
            function Stream() {}
            Stream.prototype = {};
            window.Stream = Stream;
        }
        window.Buffer = window.Buffer || { isBuffer: () => false };

        // 3. Error Trapping
        window.addEventListener('error', (event) => {
            const errorOverlay = document.createElement('div');
            errorOverlay.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(3,7,18,0.95);color:#f87171;padding:40px;z-index:99999;font-family:monospace;overflow:auto;line-height:1.6;border:2px solid #ef4444;";
            errorOverlay.innerHTML = `
                <h1 style="color:#ef4444;margin-bottom:20px;font-size:24px;">🛑 MedVault Runtime Crash</h1>
                <div style="background:#111827;padding:20px;border-radius:12px;border:1px solid #374151;">
                    <p style="color:#fff;font-weight:bold;margin-top:0;">Error: ${event.message}</p>
                    <p style="color:#9ca3af;font-size:12px;">Location: ${event.filename}:${event.lineno}:${event.colno}</p>
                    <hr style="border:0;border-top:1px solid #374151;margin:20px 0;">
                    <pre style="white-space:pre-wrap;color:#fda4af;font-size:13px;">${event.error ? event.error.stack : 'No stack trace available'}</pre>
                </div>
                <p style="margin-top:30px;color:#9ca3af;font-size:14px;">Please take a screenshot and report this to the development team.</p>
                <button onclick="location.reload()" style="margin-top:20px;background:#ef4444;color:white;border:none;padding:12px 24px;border-radius:8px;font-weight:bold;cursor:pointer;">Hard Refresh</button>
            `;
            document.body.appendChild(errorOverlay);
        });
    </script>
</head>

<body class="bg-gray-950 text-gray-100 antialiased font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
