specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: AnonymousPatientRegistry
    network: sepolia
    source:
      address: "0xdBf95d38b89d4aA87767A1FEb7d544b938668827"
      abi: AnonymousPatientRegistry
      startBlock: 11183908
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - AnonymousPatient
      abis:
        - name: AnonymousPatientRegistry
          file: ./abis/AnonymousPatientRegistry.json
      eventHandlers:
        - event: PatientRegistered(bytes32,uint256)
          handler: handleAnonymousPatientRegistered
      file: ./src/mappings/anonymous-patient-registry.ts

  - kind: ethereum
    name: TrialManager
    network: sepolia
    source:
      address: "0x05B1e4a97F460F1D59f8818c82Bd1b1Eb9C9e0ac"
      abi: TrialManager
      startBlock: 11183910
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - Trial
        - Sponsor
      abis:
        - name: TrialManager
          file: ./abis/TrialManager.json
      eventHandlers:
        - event: TrialCreated(indexed uint256,indexed address,string,uint256,bool)
          handler: handleTrialCreated
        - event: TrialDeactivated(indexed uint256)
          handler: handleTrialDeactivated
        - event: SponsorNameUpdated(indexed address,string)
          handler: handleSponsorNameUpdated
      file: ./src/mappings/trial-manager.ts

  - kind: ethereum
    name: ConsentManager
    network: sepolia
    source:
      address: "0xeF18Fc848183920d5b5E6d932a6B92559922aED3"
      abi: ConsentManager
      startBlock: 11183911
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - Consent
      abis:
        - name: ConsentManager
          file: ./abis/ConsentManager.json
      eventHandlers:
        - event: ConsentChanged()
          handler: handleConsentChanged
        - event: ConsentEpochRevoked(uint256)
          handler: handleConsentEpochRevoked
      file: ./src/mappings/consent-manager.ts

  - kind: ethereum
    name: EligibilityEngine
    network: sepolia
    source:
      address: "0x9e2C21aB3C0D6060BbACfb4c2d11719703093b7e"
      abi: EligibilityEngine
      startBlock: 11183915
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - EligibilityResult
        - Application
        - AnonymousSubmission
        - TrialPropensitySignals
      abis:
        - name: EligibilityEngine
          file: ./abis/EligibilityEngine.json
        - name: TrialManager
          file: ./abis/TrialManager.json
      eventHandlers:
        - event: EligibilityComputed(indexed address,indexed uint256)
          handler: handleEligibilityComputed
        - event: EligibilityScoreComputed(indexed address,indexed uint256)
          handler: handleEligibilityComputed
        - event: AppliedToTrial(indexed address,indexed uint256)
          handler: handleAppliedToTrial
        - event: ApplicationStatusUpdated(indexed address,indexed uint256,uint8,bytes)
          handler: handleApplicationStatusUpdated
        - event: AnonymousApplicationStatusUpdated(indexed uint256,indexed uint256,uint8)
          handler: handleAnonymousApplicationStatusUpdated
        - event: AnonymousEncryptedPropensityCommitted(indexed uint256,indexed uint256)
          handler: handleAnonymousEncryptedPropensityCommitted
        - event: EligibilityProofVerified(indexed uint256,indexed uint256,bytes32,bytes32,bytes32,bool)
          handler: handleEligibilityProofVerified
      file: ./src/mappings/eligibility-engine.ts

  - kind: ethereum
    name: SponsorIncentiveVault
    network: sepolia
    source:
      address: "0x5Ac9E00F0F58144926404D33638AD3c2BB496283"
      abi: SponsorIncentiveVault
      startBlock: 11183927
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - IncentivePool
        - IncentiveParticipant
        - ClaimLifecycle
      abis:
        - name: SponsorIncentiveVault
          file: ./abis/SponsorIncentiveVault.json
      eventHandlers:
        - event: IncentiveFunded(indexed uint256,indexed address)
          handler: handleIncentiveFunded
        - event: RewardsDistributed(indexed uint256)
          handler: handleRewardsDistributed
        - event: MilestoneRewardsDistributed(indexed uint256,uint256)
          handler: handleMilestoneRewardsDistributed
      file: ./src/mappings/sponsor-incentive-vault.ts

  - kind: ethereum
    name: TrialMilestoneManager
    network: sepolia
    source:
      address: "0x5Bde26Ee42e6F317697065762751b2B407c34bc7"
      abi: TrialMilestoneManager
      startBlock: 11183928
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - TrialMilestone
        - ParticipantProgress
      abis:
        - name: TrialMilestoneManager
          file: ./abis/TrialMilestoneManager.json
      eventHandlers:
        - event: MilestonesSet(indexed uint256,uint256)
          handler: handleMilestonesSet
        - event: MilestoneCompleted(indexed uint256,indexed address,uint256)
          handler: handleMilestoneCompleted
      file: ./src/mappings/trial-milestone-manager.ts

  - kind: ethereum
    name: DataAccessLog
    network: sepolia
    source:
      address: "0xF794A2ca0ed3E1c8401557a21a07cE4f40a8D913"
      abi: DataAccessLog
      startBlock: 11183912
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - AuditLog
      abis:
        - name: DataAccessLog
          file: ./abis/DataAccessLog.json
      eventHandlers:
        - event: ActionLogged(indexed uint8,indexed uint256,indexed bytes32)
          handler: handleActionLogged
      file: ./src/mappings/data-access-log.ts

  - kind: ethereum
    name: SponsorRegistry
    network: sepolia
    source:
      address: "0xCBD45e3fC20C646CCE77F386aA60d256A78dAa23"
      abi: SponsorRegistry
      startBlock: 11183909
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - Sponsor
      abis:
        - name: SponsorRegistry
          file: ./abis/SponsorRegistry.json
      eventHandlers:
        - event: SponsorAdded(indexed address,string)
          handler: handleSponsorAdded
        - event: SponsorRemoved(indexed address)
          handler: handleSponsorRemoved
        - event: SponsorshipRequested(indexed address,bytes32)
          handler: handleSponsorshipRequested
        - event: SponsorshipRequestResolved(indexed address,uint8)
          handler: handleSponsorshipRequestResolved
      file: ./src/mappings/sponsor-registry.ts

  - kind: ethereum
    name: MedVaultRegistry
    network: sepolia
    source:
      address: "0x05643CB59CcBe8eD61B637993e6FAfcDeC8Cae2D"
      abi: MedVaultRegistry
      startBlock: 11183932
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - AnonymousPatient
        - AnonymousSubmission
      abis:
        - name: MedVaultRegistry
          file: ./abis/MedVaultRegistry.json
        - name: ISemaphore
          file: ./abis/ISemaphore.json
      eventHandlers:
        - event: PatientRegistered(indexed uint256)
          handler: handlePatientRegistered
        - event: AnonymousApplyStaged(indexed uint256,indexed uint256,indexed bytes32,bytes32)
          handler: handleAnonymousApplyStaged
        - event: AnonymousApplication(indexed uint256,indexed uint256,indexed bytes32)
          handler: handleAnonymousApplication
      file: ./src/mappings/medvault-registry.ts

  - kind: ethereum
    name: StakingManager
    network: sepolia
    source:
      address: "0x042050F7b2C3563a2e0B840117CC3009dF883999"
      abi: StakingManager
      startBlock: 11183931
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - StakingUser
        - UnstakeRequest
      abis:
        - name: StakingManager
          file: ./abis/StakingManager.json
      eventHandlers:
        - event: Staked(indexed address)
          handler: handleStaked
        - event: Unstaked(indexed address)
          handler: handleUnstaked
        - event: PrivateUnstakeRequested(indexed address,bytes32)
          handler: handlePrivateUnstakeRequested
        - event: PublicUnstakeRequested(indexed address,bytes32)
          handler: handlePublicUnstakeRequested
      file: ./src/mappings/staking-manager.ts

  - kind: ethereum
    name: ConfidentialETH
    network: sepolia
    source:
      address: "0xfCCe6aAE4124E5B1eB78e526C124a304c8CbE1e1"
      abi: ConfidentialETH
      startBlock: 11183919
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - WithdrawRequest
      abis:
        - name: ConfidentialETH
          file: ./abis/ConfidentialETH.json
      eventHandlers:
        - event: WithdrawRequested(indexed address,bytes32)
          handler: handleWithdrawRequested
        - event: WithdrawToRequested(indexed address,bytes32)
          handler: handleWithdrawToRequested
        - event: Withdrawal(indexed address)
          handler: handleWithdrawal
      file: ./src/mappings/confidential-eth.ts

  - kind: ethereum
    name: MedVaultAutomation
    network: sepolia
    source:
      address: "0x8310cF1984A591a19d06819730bf92666B622D2f"
      abi: MedVaultAutomation
      startBlock: 11183930
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - AutomationFinalization
      abis:
        - name: MedVaultAutomation
          file: ./abis/MedVaultAutomation.json
      eventHandlers:
        - event: TrialFinalized(indexed uint256,bool,bool)
          handler: handleTrialFinalized
      file: ./src/mappings/medvault-automation.ts

  - kind: ethereum
    name: EncryptedConsentGate
    network: sepolia
    source:
      address: "0xbC3e7C79E9f7905b95660b7287e64F01F3775a8E"
      abi: EncryptedConsentGate
      startBlock: 11183917
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - ConsentGateCheck
      abis:
        - name: EncryptedConsentGate
          file: ./abis/EncryptedConsentGate.json
      eventHandlers:
        - event: GateComputed(indexed uint256,indexed bytes32,bytes32)
          handler: handleGateComputed
      file: ./src/mappings/encrypted-consent-gate.ts

  - kind: ethereum
    name: EncryptedScoreLeaderboard
    network: sepolia
    source:
      address: "0x0de74E03781954DFE16D5bdEcD48013b1462D0A4"
      abi: EncryptedScoreLeaderboard
      startBlock: 11183918
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - BlindRankingEvent
      abis:
        - name: EncryptedScoreLeaderboard
          file: ./abis/EncryptedScoreLeaderboard.json
      eventHandlers:
        - event: ApplicantAdded(indexed uint256,indexed uint256)
          handler: handleApplicantAdded
        - event: ComparisonComputed(indexed uint256,indexed uint256,indexed uint256,bytes32)
          handler: handleComparisonComputed
      file: ./src/mappings/encrypted-score-leaderboard.ts
