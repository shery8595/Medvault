specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: PatientRegistry
    network: arbitrum-sepolia
    source:
      address: "0xE759A21B97819fD12aAB1E6f7019D8148F11bbC3"
      abi: PatientRegistry
      startBlock: 252990000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Patient
      abis:
        - name: PatientRegistry
          file: ./abis/PatientRegistry.json
      eventHandlers:
        - event: ProfileUpdated(indexed address,uint256)
          handler: handleProfileUpdated
      file: ./src/mappings/patient-registry.ts

  - kind: ethereum
    name: TrialManager
    network: arbitrum-sepolia
    source:
      address: "0x90A340c7C09Fa72243F23AB6A3310610649384b2"
      abi: TrialManager
      startBlock: 252990000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Trial
        - Sponsor
      abis:
        - name: TrialManager
          file: ./abis/TrialManager.json
      eventHandlers:
        - event: TrialCreated(indexed uint256,indexed address,string,uint256)
          handler: handleTrialCreated
        - event: TrialDeactivated(indexed uint256)
          handler: handleTrialDeactivated
        - event: SponsorNameUpdated(indexed address,string)
          handler: handleSponsorNameUpdated
      file: ./src/mappings/trial-manager.ts

  - kind: ethereum
    name: ConsentManager
    network: arbitrum-sepolia
    source:
      address: "0x0f2042a1e50d566959B010eaCDfF51be1024EA68"
      abi: ConsentManager
      startBlock: 252990000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Consent
      abis:
        - name: ConsentManager
          file: ./abis/ConsentManager.json
      eventHandlers:
        - event: ConsentGranted(indexed address,indexed uint256)
          handler: handleConsentGranted
        - event: ConsentRevoked(indexed address,indexed uint256)
          handler: handleConsentRevoked
      file: ./src/mappings/consent-manager.ts

  - kind: ethereum
    name: EligibilityEngine
    network: arbitrum-sepolia
    source:
      address: "0x9ce11CA3E61AbE27B83d38053739F2a0F825C00b"
      abi: EligibilityEngine
      startBlock: 252990000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - EligibilityResult
        - Application
      abis:
        - name: EligibilityEngine
          file: ./abis/EligibilityEngine.json
        - name: TrialManager
          file: ./abis/TrialManager.json
      eventHandlers:
        - event: EligibilityComputed(indexed address,indexed uint256)
          handler: handleEligibilityComputed
        - event: EligibilityScoreComputed(indexed address,indexed uint256)
          handler: handleEligibilityComputed
        - event: AppliedToTrial(indexed address,indexed uint256)
          handler: handleAppliedToTrial
        - event: ApplicationStatusUpdated(indexed address,indexed uint256,uint8,bytes)
          handler: handleApplicationStatusUpdated
      file: ./src/mappings/eligibility-engine.ts

  - kind: ethereum
    name: SponsorIncentiveVault
    network: arbitrum-sepolia
    source:
      address: "0x10cF533eb4337deBf8F682D20E56246865787393"
      abi: SponsorIncentiveVault
      startBlock: 252990000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - IncentivePool
        - IncentiveParticipant
      abis:
        - name: SponsorIncentiveVault
          file: ./abis/SponsorIncentiveVault.json
      eventHandlers:
        - event: IncentiveFunded(indexed uint256,indexed address,uint256)
          handler: handleIncentiveFunded
        - event: ParticipantRegistered(indexed uint256,indexed address)
          handler: handleParticipantRegistered
        - event: RewardsDistributed(indexed uint256,uint256,uint256)
          handler: handleRewardsDistributed
        - event: MilestoneRewardsDistributed(indexed uint256,uint256,uint256)
          handler: handleMilestoneRewardsDistributed
      file: ./src/mappings/sponsor-incentive-vault.ts

  - kind: ethereum
    name: DataAccessLog
    network: arbitrum-sepolia
    source:
      address: "0x69396B26Ce11c1B74B1203ca44cf7ba7ED12Bbb0"
      abi: DataAccessLog
      startBlock: 252990000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - AuditLog
      abis:
        - name: DataAccessLog
          file: ./abis/DataAccessLog.json
      eventHandlers:
        - event: ActionLogged(indexed uint8,indexed uint256,indexed bytes32)
          handler: handleActionLogged
      file: ./src/mappings/data-access-log.ts

  - kind: ethereum
    name: TrialMilestoneManager
    network: arbitrum-sepolia
    source:
      address: "0x15CDC92dfFAE9543636FdB611f3A8Cc74ba44b7e"
      abi: TrialMilestoneManager
      startBlock: 252990000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TrialMilestone
        - ParticipantProgress
      abis:
        - name: TrialMilestoneManager
          file: ./abis/TrialMilestoneManager.json
      eventHandlers:
        - event: MilestonesSet(indexed uint256,uint256)
          handler: handleMilestonesSet
        - event: MilestoneCompleted(indexed uint256,indexed address,uint256)
          handler: handleMilestoneCompleted
      file: ./src/mappings/trial-milestone-manager.ts

  - kind: ethereum
    name: SponsorRegistry
    network: arbitrum-sepolia
    source:
      address: "0x4F5d99b08EC26903d2CEDBee06CA1867E4b682b3"
      abi: SponsorRegistry
      startBlock: 252990000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Sponsor
      abis:
        - name: SponsorRegistry
          file: ./abis/SponsorRegistry.json
      eventHandlers:
        - event: SponsorAdded(indexed address,string)
          handler: handleSponsorAdded
        - event: SponsorRemoved(indexed address)
          handler: handleSponsorRemoved
        - event: SponsorshipRequested(indexed address,bytes)
          handler: handleSponsorshipRequested
        - event: SponsorshipRequestResolved(indexed address,uint8)
          handler: handleSponsorshipRequestResolved
      file: ./src/mappings/sponsor-registry.ts

  - kind: ethereum
    name: StakingManager
    network: arbitrum-sepolia
    source:
      address: "0x946e1C0C73dd643ebab62fd52c2e354c831fcc4a"
      abi: StakingManager
      startBlock: 252990000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - StakingUser
      abis:
        - name: StakingManager
          file: ./abis/StakingManager.json
      eventHandlers:
        - event: Staked(indexed address,uint256)
          handler: handleStaked
        - event: Unstaked(indexed address,uint256)
          handler: handleUnstaked
      file: ./src/mappings/staking-manager.ts
