type Patient @entity(immutable: false) {
  id: Bytes!                           # wallet address
  profileUpdatedAt: BigInt!
  profileTxHash: Bytes!
}

type Sponsor @entity(immutable: false) {
  id: Bytes!                           # wallet address
  name: String!
  verified: Boolean!
  addedAt: BigInt!
  trials: [Trial!]! @derivedFrom(field: "sponsor")
}

type SponsorshipRequest @entity(immutable: false) {
  id: Bytes!                           # wallet address
  encryptedData: Bytes!
  status: String!                      # Pending, Approved, Rejected
  requestedAt: BigInt!
  txHash: Bytes!
}

type Trial @entity(immutable: false) {
  id: ID!                              # on-chain trial ID
  sponsor: Sponsor!
  name: String!
  phase: String!
  location: String!
  compensation: String!
  minAge: Int!
  maxAge: Int!
  requiresDiabetes: Boolean!
  minHb: Int!

  # Expanded Criteria
  genderRequirement: Int!              # 0=any, 1=Male, 2=Female
  minHeight: Int!
  maxWeight: Int!
  requiresNonSmoker: Boolean!
  requiresNormalBP: Boolean!

  encryptedCriteria: Boolean!

  active: Boolean!
  endTime: BigInt!
  createdAt: BigInt!
  consents: [Consent!]! @derivedFrom(field: "trial")
  eligibilityResults: [EligibilityResult!]! @derivedFrom(field: "trial")
  applications: [Application!]! @derivedFrom(field: "trial")
  incentivePool: IncentivePool @derivedFrom(field: "trial")
  milestones: [TrialMilestone!]! @derivedFrom(field: "trial")
  progress: [ParticipantProgress!]! @derivedFrom(field: "trial")
  anonymousSubmissions: [AnonymousSubmission!]! @derivedFrom(field: "trial")
  propensitySignals: [TrialPropensitySignals!]! @derivedFrom(field: "trial")
}

# Aggregate indexer-visible signals for encrypted propensity commits (no score plaintext).
type TrialPropensitySignals @entity(immutable: false) {
  id: ID!
  trial: Trial!
  signalCount: Int!
  lastSignalAt: BigInt!
}
type TrialMilestone @entity(immutable: false) {
  id: ID!                              # trialId-index
  trial: Trial!
  index: Int!
  name: String!
  weightBps: Int!
  deadline: BigInt!
  distributed: Boolean!
}

type ParticipantProgress @entity(immutable: false) {
  id: ID!                              # trialId-patientAddress
  trial: Trial!
  patient: Bytes!
  lastCompletedMilestoneIndex: Int!    # -1 if none, 0-3 for milestones
  updatedAt: BigInt!
}

type AuditLog @entity(immutable: true) {
  id: ID!                              # incremental or txHash-logIndex
  action: String!                      # ActionType ENUM as string
  actionType: String!                 # Alias for action
  trialId: BigInt!
  patientHash: Bytes!
  commitment: BigInt                   # For anonymous operations
  timestamp: BigInt!
  performer: Bytes!
  actor: Bytes!                        # Alias for performer
  transactionHash: String!             # Alias for txHash as string
  txHash: Bytes!
}

# Current consent epoch for a patient (bumped by revokeAllConsent kill-switch).
type PatientConsentEpoch @entity(immutable: false) {
  id: ID!                              # patient address (hex)
  patient: Bytes!
  epoch: BigInt!
  lastUpdatedAt: BigInt!
}

type Consent @entity(immutable: false) {
  id: ID!                              # patient-trialId (concatenated)
  patient: Bytes!
  trial: Trial!
  granted: Boolean!
  validEpoch: BigInt!                  # consentEpoch at time of grant; must match PatientConsentEpoch.epoch
  expiresAt: BigInt!                   # 0 = no time limit; else unix seconds deadline
  lastUpdatedAt: BigInt!
  txHash: Bytes!
}

type EligibilityResult @entity(immutable: true) {
  id: ID!                              # patient-trialId (concatenated)
  patient: Bytes!
  trial: Trial!
  computedAt: BigInt!
  txHash: Bytes!
}

type Application @entity(immutable: false) {
  id: ID!                              # patient-trialId
  patient: Bytes!
  trial: Trial!
  status: String!                      # Pending, Accepted, Rejected
  message: Bytes                       # Encrypted message from sponsor
  updatedAt: BigInt!
  txHash: Bytes!
}

type IncentivePool @entity(immutable: false) {
  id: ID!                              # trialId
  trial: Trial!
  participantCount: Int!
  distributed: Boolean!
  distributedAt: BigInt
  lastFundedAt: BigInt
  participants: [IncentiveParticipant!]! @derivedFrom(field: "pool")
}

type IncentiveParticipant @entity(immutable: true) {
  id: ID!                              # trialId-nullifier
  pool: IncentivePool!
  nullifier: BigInt!
  registeredAt: BigInt!
}

type StakingUser @entity(immutable: false) {
  id: ID!                              # user wallet address
  lastUpdatedAt: BigInt!
}

# ZK Anonymous Application Entities
type ZKCommitment @entity(immutable: true) {
  id: ID!                              # commitment hash (bytes32 as hex)
  commitmentHash: Bytes!               # the actual commitment bytes32
  registeredAt: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type ZKAnonymousApplication @entity(immutable: true) {
  id: ID!                              # nullifier-trialId
  trial: String!                       # trial ID (not a relation since no Trial FK needed)
  nullifier: Bytes!                    # nullifier hash
  commitment: Bytes!                   # commitment hash
  appliedAt: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type ZKProof @entity(immutable: true) {
  id: ID!                              # txHash
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

# Semaphore-based Anonymous Registration Entities
type AnonymousPatient @entity(immutable: true) {
  id: ID!                              # identityCommitment as hex string
  commitment: BigInt!                  # the Semaphore identity commitment
  registeredAt: BigInt!
}

type AnonymousSubmission @entity(immutable: false) {
  id: ID!                              # nullifier-trialId
  trial: Trial!
  trialId: BigInt!
  nullifier: BigInt!
  submittedAt: BigInt!
  status: String!                      # Staged, Pending, Accepted, Rejected
  statusUpdatedAt: BigInt
  stagedAt: BigInt                     # set when AnonymousApplyStaged fires
  finalCt: Bytes                       # ebool ct hash from staging (bytes32)
  fhePropensityCommittedAt: BigInt     # AnonymousEncryptedPropensityCommitted
  noirCertified: Boolean!
  noirEligible: Boolean                # from EligibilityProofVerified
  noirCertifiedAt: BigInt
  attestationResultHash: Bytes
  attestationFheStageHash: Bytes
  attestationCriteriaSchemaHash: Bytes
}

type ClaimLifecycle @entity(immutable: false) {
  id: ID!                              # trialId-permitHolder
  trialId: BigInt!
  permitHolder: Bytes!
  transferableHandle: Bytes!
  initiatedAt: BigInt!
  initiatedTxHash: Bytes!
  completed: Boolean!
  completedAt: BigInt
}

type WithdrawRequest @entity(immutable: true) {
  id: ID!                              # txHash-logIndex
  user: Bytes!
  transferableHandle: Bytes!
  kind: String!                        # withdraw | withdrawTo
  blockNumber: BigInt!
  txHash: Bytes!
}

type UnstakeRequest @entity(immutable: true) {
  id: ID!
  user: Bytes!
  transferableHandle: Bytes!
  blockNumber: BigInt!
  txHash: Bytes!
}

type AutomationFinalization @entity(immutable: true) {
  id: ID!                              # txHash-logIndex
  trialId: BigInt!
  distributed: Boolean!
  deactivated: Boolean!
  blockNumber: BigInt!
  txHash: Bytes!
}

type ConsentGateCheck @entity(immutable: true) {
  id: ID!                              # txHash-logIndex
  trialId: BigInt!
  resultId: Bytes!
  blockNumber: BigInt!
  txHash: Bytes!
}

type BlindRankingEvent @entity(immutable: true) {
  id: ID!                              # txHash-logIndex
  trialId: BigInt!
  nullifierA: BigInt!
  nullifierB: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}
